<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Galerie product-types</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        padding: 24px;
        color: #0f172a;
      }
      h1 {
        margin: 0 0 8px;
      }
      #hint {
        color: #b45309;
        margin: 8px 0 16px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 16px;
        margin-top: 24px;
      }
      .card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
      }
      .card img {
        width: 100%;
        height: 140px;
        object-fit: contain;
      }
      .missing {
        color: red;
        font-weight: 700;
        margin-top: 8px;
        display: none;
      }
      .name {
        margin-top: 8px;
        font-size: 14px;
      }
      .url {
        margin-top: 6px;
        font-size: 12px;
        word-break: break-all;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <h1>Galerie product-types</h1>
    <p>Supabase Storage (bucket <code>product-types</code>)</p>
    <p id="hint" hidden></p>
    <div class="grid" id="grid"></div>
    <script>
      (function () {
        var BUCKET = "product-types";
        var files = [
          "butter.png",
          "cheese.png",
          "chocolate_bar.png",
          "drink_can.png",
          "cola_bottle.png",
          "alcohol_bottle.png",
          "cream.png",
          "chicken_meat.png",
          "beer.png",
          "mandarins.png",
          "grapes.png",
          "placeholder.png",
        ];

        function publicImageUrl(base, file) {
          var clean = String(file)
            .replace(/^\/+/, "")
            .replace(/^product-types\/+/, "");
          var u = String(base || "").replace(/\/$/, "");
          return u + "/storage/v1/object/public/" + BUCKET + "/" + clean;
        }

        function showHint(msg) {
          var el = document.getElementById("hint");
          el.textContent = msg;
          el.hidden = false;
        }

        fetch("/api/gallery-public-config")
          .then(function (r) {
            if (!r.ok) throw new Error("config " + r.status);
            return r.json();
          })
          .then(function (cfg) {
            var supabaseUrl = cfg.supabaseUrl || "";
            if (!supabaseUrl) {
              showHint("Chybí NEXT_PUBLIC_SUPABASE_URL v prostředí.");
              return;
            }
            var grid = document.getElementById("grid");
            files.forEach(function (file) {
              var url = publicImageUrl(supabaseUrl, file);
              var card = document.createElement("div");
              card.className = "card";
              var img = document.createElement("img");
              img.src = url;
              img.alt = file;
              var missing = document.createElement("div");
              missing.className = "missing";
              missing.textContent = "Nenalezeno";
              img.onerror = function () {
                img.style.display = "none";
                missing.style.display = "block";
              };
              var name = document.createElement("div");
              name.className = "name";
              name.textContent = file;
              var u = document.createElement("div");
              u.className = "url";
              u.textContent = url;
              card.appendChild(img);
              card.appendChild(missing);
              card.appendChild(name);
              card.appendChild(u);
              grid.appendChild(card);
            });
          })
          .catch(function () {
            showHint("Nepodařilo se načíst konfiguraci (zkontroluj deploy a /api/gallery-public-config).");
          });
      })();
    </script>
  </body>
</html>
